<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SVITS Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-branding">
            <div class="branding-content">
                <i class="fas fa-university logo"></i>
                <h1>SVITS Portal</h1>
                <p>One Platform for Students, Faculty & Admins</p>
                <img src="https://placehold.co/400x300/FFFFFF/007bff?text=Welcome+to+SVITS" alt="Portal Illustration" class="branding-hero">
            </div>
        </div>

        <div class="login-form-container">
            <form id="loginForm" class="login-form">
                <h2>Portal Login</h2>
                <p class="form-description">Please select your role and sign in.</p>

                <div id="errorMessage" class="error-message"></div>

                <div class="form-group">
                    <label for="role">Select Your Role</label>
                    <select id="role" name="role" required>
                        <option value="" disabled selected>-- Select Role --</option>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required>
                        <i class="fas fa-eye-slash" id="togglePassword"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        Remember Me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">
                    <span class="btn-text">Login</span>
                    <i class="fas fa-spinner fa-spin" id="loginSpinner"></i>
                </button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
